name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Verify deployed site returns HTTP 200
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.url }}
        run: |
          SITE_URL="${DEPLOY_URL:-https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}}"
          echo "Verifying deployment at: $SITE_URL"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" --retry 3 --retry-delay 10 "$SITE_URL")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "ERROR: Site returned HTTP $HTTP_STATUS instead of 200"
            exit 1
          fi
          echo "SUCCESS: Site is live and returning HTTP 200"
